# CapStash Miner - Android ARM64 Build Targets
# Format: TARGET_NAME|MCPU_FLAG|MARCH_FLAG|DESCRIPTION
#
# Notes:
# - mcpu tunes instruction scheduling for the SoC's big core
# - march sets the minimum architecture feature level
# - All targets are aarch64-linux-android (64-bit ARM)
# - Builds use NDK r26d with API level 28 (Android 9.0+)

# === Qualcomm Snapdragon (Flagship) ===
sd821|cortex-a72|armv8-a+crc+crypto|Snapdragon 821 (Pixel 1, OnePlus 3T, LG G6)
