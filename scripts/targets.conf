sd888|cortex-a78|armv8.2-a+crc+crypto+dotprod+fp16|Snapdragon 888 A78-tuned (Galaxy S21/Z Fold3, OnePlus 9)
sd888_x1|cortex-x1|armv8.2-a+crc+crypto+dotprod+fp16|Snapdragon 888 X1-tuned (Galaxy Z Fold3 fleet)
